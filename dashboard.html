<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto OTC Index Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f23; color: #fff; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 200px; background: #1a1a2e; padding: 20px; overflow-y: auto; }
        .sidebar h2 { font-size: 18px; margin-bottom: 20px; color: #4fc3f7; }
        .coin-item { padding: 10px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; transition: background 0.3s; }
        .coin-item:hover { background: #2a2a4e; }
        .coin-item.active { background: #4fc3f7; color: #000; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .chart-container { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .chart-container h3 { margin-bottom: 15px; color: #4fc3f7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>🪙 币种选择</h2>
            <div id="coin-list"></div>
        </div>
        <div class="main">
            <div class="chart-container">
                <h3>场外指数与爆破指数趋势图</h3>
                <canvas id="combinedChart"></canvas>
            </div>
        </div>
    </div>
    <script>
        const allData = {"BTC": {"dates": ["2026-04-18 (进场期)", "2026-04-19 (进场期)", "2026-04-20 (进场期)", "2026-04-21 (进场期)", "2026-04-22 (进场期)", "2026-04-23 (退场期)", "2026-04-24 (退场期)", "2026-04-25 (退场期)"], "otc": [1100, 1150, 1180, 1220, 1200, 1180, 1150, 1120], "explosion": [120, 135, 145, 160, 150, 140, 130, 120], "statuses": ["进场期第 1 天", "进场期第 2 天", "进场期第 3 天", "进场期第 4 天", "进场期第 5 天", "退场期第 1 天", "退场期第 2 天", "退场期第 3 天"]}, "ETH": {"dates": ["2026-04-18 (进场期)", "2026-04-19 (进场期)", "2026-04-20 (进场期)", "2026-04-21 (进场期)", "2026-04-22 (进场期)", "2026-04-23 (退场期)", "2026-04-24 (退场期)", "2026-04-25 (退场期)"], "otc": [1200, 1250, 1280, 1320, 1300, 1280, 1250, 1220], "explosion": [140, 155, 165, 180, 180, 170, 160, 150], "statuses": ["进场期第 1 天", "进场期第 2 天", "进场期第 3 天", "进场期第 4 天", "进场期第 5 天", "退场期第 1 天", "退场期第 2 天", "退场期第 3 天"]}};
        const priority = ["BTC", "ETH"];
        
        let currentCoin = priority[0];
        
        function renderChart() {
            const coinData = allData[currentCoin];
            if (!coinData) return;
            
            new Chart(document.getElementById('combinedChart'), {
                type: 'line',
                data: {
                    labels: coinData.dates,
                    datasets: [
                        {
                            label: '场外指数',
                            data: coinData.otc,
                            borderColor: '#4fc3f7',
                            backgroundColor: 'rgba(79, 195, 247, 0.1)',
                            yAxisID: 'y',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '爆破指数',
                            data: coinData.explosion,
                            borderColor: '#ff9800',
                            backgroundColor: 'rgba(255, 152, 0, 0.1)',
                            yAxisID: 'y1',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: '#fff' }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: '#4fc3f7' },
                            title: {
                                display: true,
                                text: '场外指数',
                                color: '#4fc3f7'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: '#ff9800' },
                            title: {
                                display: true,
                                text: '爆破指数',
                                color: '#ff9800'
                            }
                        }
                    }
                }
            });
            
            // 更新币种列表
            const coinListHTML = priority.map(coin => {
                const isActive = coin === currentCoin ? 'active' : '';
                return '<div class="coin-item ' + isActive + '" onclick="selectCoin(' + String.fromCharCode(39) + coin + String.fromCharCode(39) + ')">' + coin + '</div>';
            }).join('');
            document.getElementById('coin-list').innerHTML = coinListHTML;
        }
        
        function selectCoin(coin) {
            currentCoin = coin;
            renderChart();
        }
        
        renderChart();
    </script>
</body>
</html>
